tmdb:
  base-url: https://api.themoviedb.org
  api-version: 3
  image:
    size: original
    url: https://image.tmdb.org/t/p
    not-found: https://www.themoviedb.org/assets/2/v4/glyphicons/basic/glyphicons-basic-38-picture-grey-c2ebdbb057f2a7614185931650f8cee23fa137b93812ccb132b9df511df1cfac.svg
  uri:
    search:
      multi: /search/multi
    discover:
      movie: /discover/movie
      tv-show: /discover/tv
    trending:
      all: /trending/all/{time_window}
      movie: trending/movie/{time_window}
      tv: trending/tv/{time_window}
    movie:
      now-playing: /movie/now_playing
      popular: /movie/popular
      top-rated: /movie/top_rated
      details: /movie/{movie_id}
      credits: /movie/{movie_id}/credits
    tv-show:
      airing-today: /tv/airing_today
      details: /tv/{series_id}
    genre:
      movie: /genre/movie/list
      tv-show: /genre/tv/list

